name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Test
        run: go test ./... -cover
      - name: Build
        run: go build ./...
